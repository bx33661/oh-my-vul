# oh-my-vul skill registry
# Lists all skills in this collection with their invocation, status, and contract bindings.

name: oh-my-vul
version: "0.9.0"
platform: claude-code
updated: "2026-07-10"

skills:
  - name: using-omv
    category: manager
    path: skills/using-omv
    invocation: /using-omv
    status: stable
    description: Bootstrap research discipline — hard gates, evidence-before-claims, process before improvisation (quality growth, not skill sprawl)
    produces: []
    consumes: []

  - name: omv
    category: manager
    path: skills/omv
    invocation: /omv
    status: stable
    description: Local-first project manager — creates research campaigns, shows workspace status, and delegates finding lifecycle actions
    produces:
      - Campaign.v1
      - Evidence.v1    # candidate hypotheses from explicit campaign seed
      - SourceRef.v1   # optional local source identity sidecar
    consumes: []

  - name: omv-find
    category: research
    path: skills/omv-find
    invocation: /omv-find
    status: stable
    description: Find and rank open-source packages worth auditing for passive CVE research
    produces:
      - CandidateList.v1
      - Evidence.v1    # handoff packet on confirmed/explicit request
    consumes: []

  - name: omv-audit
    category: audit
    path: skills/omv-audit
    invocation: /omv-audit
    status: stable
    description: Deep-audit a candidate finding — prove or disprove the vulnerability, fill Evidence.v1 fields for omv-report
    produces:
      - Evidence.v1    # confirmed or blocked finding with all fields populated
      - ThreatMap.v1   # optional source -> transform -> sink -> guard graph
      - Verification.v1 # optional adversarial verifier review sidecar
    consumes:
      - Evidence.v1    # candidate finding from omv-find

  - name: omv-repro
    category: audit
    path: skills/omv-repro
    invocation: /omv-repro
    status: stable
    description: Guide local reproduction of a finding — walk through execution, record observed_result, confirm or block
    produces:
      - Evidence.v1    # confirmed or blocked finding with observed_result populated
    consumes:
      - Evidence.v1    # candidate/confirmed finding with evidence.reproducer filled

  - name: omv-report
    category: reporting
    path: skills/omv-report
    invocation: /omv-report
    status: stable
    description: Generate VulDB/CVE/GHSA/OSV advisory reports from confirmed findings
    produces:
      - VulDB form output
      - GHSA advisory
      - OSV JSON
      - Markdown advisory
      - ReportProvenance.v1
    consumes:
      - Evidence.v1    # writes cvss and dedup subfields
      - ThreatMap.v1
      - Verification.v1
      - SourceRef.v1

  - name: omv-radar
    category: intelligence
    path: skills/omv-radar
    invocation: /omv-radar
    status: active
    description: Passive watchlist intelligence — refresh local advisory/release signals and summarize radar events
    produces:
      - RadarEvents.v1
    consumes: []

  - name: omv-dedup
    category: intelligence
    path: skills/omv-dedup
    invocation: /omv-dedup
    status: active
    description: Duplicate advisory analysis — generate deterministic NVD/GHSA/OSV/ecosystem queries and update Evidence.v1 dedup fields
    produces:
      - Evidence.v1
    consumes:
      - Evidence.v1

  - name: omv-disclose
    category: disclosure
    path: skills/omv-disclose
    invocation: /omv-disclose
    status: active
    description: Responsible disclosure lifecycle helper — draft vendor emails, timelines, and local submission bookkeeping guidance
    produces:
      - Submission.v1
    consumes:
      - Evidence.v1

  - name: omv-critic
    category: reporting
    path: skills/omv-critic
    invocation: /omv-critic
    status: active
    description: Adversarial pre-submission review — identify likely CNA rejection reasons before report generation
    produces:
      - Verification.v1
    consumes:
      - Evidence.v1
      - ThreatMap.v1
      - Verification.v1

agents:
  - name: vuln-scanner
    path: agents/vuln-scanner.md
    used_by: [omv-find]
    claude_agent: agents/vuln-scanner.md
    status: active

  - name: dataflow-tracer
    path: agents/dataflow-tracer.md
    used_by: [omv-find, omv-audit]
    claude_agent: agents/dataflow-tracer.md
    status: active

  - name: guard-checker
    path: agents/guard-checker.md
    used_by: [omv-audit]
    claude_agent: agents/guard-checker.md
    status: active
    description: Adversarial guard bypass assessment — evaluates whether a found guard actually prevents exploitation

  - name: cvss-analyst
    path: agents/cvss-analyst.md
    used_by: [omv-report, omv-audit]
    claude_agent: agents/cvss-analyst.md
    status: active

  - name: dedup-analyst
    path: agents/dedup-analyst.md
    used_by: [omv-report, omv-dedup, omv-critic]
    claude_agent: agents/dedup-analyst.md
    status: active

  - name: report-writer
    path: agents/report-writer.md
    used_by: [omv-report]
    claude_agent: agents/report-writer.md
    status: active

  - name: verifier
    path: agents/verifier.md
    used_by: [omv-audit, omv-report, omv-critic]
    claude_agent: agents/verifier.md
    status: active
    description: Adversarial verification agent — independently refutes a candidate audit conclusion; bias toward "wrong"

contracts:
  - name: Campaign.v1
    path: contracts/campaign.v1.yaml
    description: Local research campaign target, scope, priorities, and candidate lanes

  - name: Evidence.v1
    path: contracts/evidence.v1.yaml
    description: Finding object — the typed boundary between omv-find and omv-report

  - name: SourceRef.v1
    path: contracts/source-ref.v1.yaml
    description: Optional local source identity and Evidence hash sidecar

  - name: ReportProvenance.v1
    path: contracts/report-provenance.v1.yaml
    description: Generated SHA-256 manifest for reports and local dependencies

  - name: CandidateList.v1
    path: contracts/candidate-list.v1.yaml
    description: Candidate table entry schema produced by omv-find

  - name: ThreatMap.v1
    path: contracts/threat-map.v1.yaml
    description: Optional dataflow threat map sidecar produced by omv-audit

  - name: Verification.v1
    path: contracts/verification.v1.yaml
    description: Adversarial verifier review sidecar for source-to-sink and report-readiness claims

  - name: Submission.v1
    path: contracts/submission.v1.yaml
    description: Local submission tracking sidecar for report follow-up

