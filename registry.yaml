# oh-my-vul skill registry
# Lists all skills in this collection with their invocation, status, and contract bindings.

name: oh-my-vul
version: "0.7.1"
platform: claude-code
updated: "2026-05-06"

skills:
  - name: omv
    category: manager
    path: skills/omv
    invocation: /omv
    status: stable
    description: Local-first project manager — shows workspace status, active finding next actions, archive state, and installed skills
    produces: []
    consumes: []

  - name: omv-find
    category: research
    path: skills/omv-find
    invocation: /omv-find
    status: stable
    description: Find and rank open-source packages worth auditing for passive CVE research
    produces:
      - CandidateList.v1
      - Evidence.v1    # handoff packet on confirmed/explicit request
    consumes: []

  - name: omv-audit
    category: audit
    path: skills/omv-audit
    invocation: /omv-audit
    status: stable
    description: Deep-audit a candidate finding — prove or disprove the vulnerability, fill Evidence.v1 fields for omv-report
    produces:
      - Evidence.v1    # confirmed or blocked finding with all fields populated
    consumes:
      - Evidence.v1    # candidate finding from omv-find

  - name: omv-repro
    category: audit
    path: skills/omv-repro
    invocation: /omv-repro
    status: stable
    description: Guide local reproduction of a finding — walk through execution, record observed_result, confirm or block
    produces:
      - Evidence.v1    # confirmed or blocked finding with observed_result populated
    consumes:
      - Evidence.v1    # candidate/confirmed finding with evidence.reproducer filled

  - name: omv-report
    category: reporting
    path: skills/omv-report
    invocation: /omv-report
    status: stable
    description: Generate VulDB/CVE/GHSA/OSV advisory reports from confirmed findings
    produces:
      - VulDB form output
      - GHSA advisory
      - OSV JSON
      - Markdown advisory
    consumes:
      - Evidence.v1    # writes cvss and dedup subfields

  - name: omv-radar
    category: intelligence
    path: skills/omv-radar
    invocation: /omv-radar
    status: active
    description: Passive watchlist intelligence — refresh local advisory/release signals and summarize radar events
    produces:
      - RadarEvents.v1
    consumes: []

  - name: omv-dedup
    category: intelligence
    path: skills/omv-dedup
    invocation: /omv-dedup
    status: active
    description: Duplicate advisory analysis — generate deterministic NVD/GHSA/OSV/ecosystem queries and update Evidence.v1 dedup fields
    produces:
      - Evidence.v1
    consumes:
      - Evidence.v1

  - name: omv-disclose
    category: disclosure
    path: skills/omv-disclose
    invocation: /omv-disclose
    status: active
    description: Responsible disclosure lifecycle helper — draft vendor emails, timelines, and local submission bookkeeping guidance
    produces:
      - Submission.v1
    consumes:
      - Evidence.v1

  - name: omv-critic
    category: reporting
    path: skills/omv-critic
    invocation: /omv-critic
    status: active
    description: Adversarial pre-submission review — identify likely CNA rejection reasons before report generation
    produces: []
    consumes:
      - Evidence.v1
      - ThreatMap.v1

agents:
  - name: vuln-scanner
    path: agents/vuln-scanner.md
    used_by: [omv-find]

  - name: dataflow-tracer
    path: agents/dataflow-tracer.md
    used_by: [omv-find, omv-audit]

  - name: cvss-analyst
    path: agents/cvss-analyst.md
    used_by: [omv-report, omv-audit]

  - name: dedup-analyst
    path: agents/dedup-analyst.md
    used_by: [omv-report, omv-dedup, omv-critic]

  - name: report-writer
    path: agents/report-writer.md
    used_by: [omv-report]

contracts:
  - name: Evidence.v1
    path: contracts/evidence.v1.yaml
    description: Finding object — the typed boundary between omv-find and omv-report

  - name: CandidateList.v1
    path: contracts/candidate-list.v1.yaml
    description: Candidate table entry schema produced by omv-find

  - name: ThreatMap.v1
    path: contracts/threat-map.v1.yaml
    description: Optional dataflow threat map sidecar produced by omv-audit

  - name: Submission.v1
    path: contracts/submission.v1.yaml
    description: Local submission tracking sidecar for report follow-up

shared:
  references:
    - shared/references/ecosystems.md
    - shared/references/vuln-patterns.md
    - shared/references/cvss-builder.md
    - shared/references/patterns/npm.md
    - shared/references/patterns/python.md
    - shared/references/patterns/go.md
    - shared/references/patterns/rust.md
    - shared/references/patterns/java.md
    - shared/references/patterns/ruby.md
  scripts:
    - shared/scripts/collect_metadata.py
    - shared/scripts/estimate_loc.sh
