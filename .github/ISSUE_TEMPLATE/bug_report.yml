name: Bug report
description: Report a CLI, install, packaging, or skill behavior bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, commands, or sample input.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.7.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Node version, OS, Codex environment, install path
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      render: shell
